<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Diagram — Crop Shooter Survival</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c08;--bg2:#0e150e;--bg3:#141e14;
  --bd:#1e301e;--bd2:#2a422a;
  --g:#7fff5f;--y:#ffcf3f;--r:#ff6b3f;--b:#3fbfff;--p:#bf7fff;
  --w:#deeade;--mu:#4a664a;
  --fh:'Syne',sans-serif;--fm:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--w);font-family:var(--fm);font-size:12px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(127,255,95,.016) 1px,transparent 1px),linear-gradient(90deg,rgba(127,255,95,.016) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;padding:24px 20px 80px}
.hd{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;border-bottom:1px solid var(--bd);padding-bottom:14px}
.hd h1{font-family:var(--fh);font-size:22px;font-weight:800;letter-spacing:-1px;color:var(--g)}
.hd p{color:var(--mu);font-size:10px}

/* TABS */
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--bd)}
.tab{padding:7px 16px;font-size:10px;font-family:var(--fh);font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;transition:color .1s;white-space:nowrap}
.tab:hover{color:var(--w)}.tab.active{color:var(--g);border-bottom-color:var(--g)}
.view{display:none}.view.active{display:block}

/* LEGEND */
.leg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;padding:8px 12px;border:1px solid var(--bd);background:var(--bg2)}
.li{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--mu)}
.ld{width:8px;height:8px;border-radius:1px;flex-shrink:0}

/* DIAGRAM */
.scroll-x{overflow-x:auto;overflow-y:visible}
.diagram{position:relative;display:inline-flex;flex-direction:column;min-width:1040px}
svg.lines{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;z-index:5}
.day-block{display:flex;flex-direction:column}
.day-strip{display:flex;align-items:center;gap:8px;padding:4px 10px;background:var(--bg3);border-top:1px solid var(--bd2);border-bottom:1px solid var(--bd);position:sticky;left:0;z-index:3}
.day-num{font-family:var(--fh);font-size:10px;font-weight:800;color:#000;padding:2px 8px;white-space:nowrap}
.d1{background:var(--g)}.d3{background:#9dff7f}.d5{background:var(--y)}.d8{background:#ff9f3f}.d10{background:var(--r);color:#fff}.d12{background:var(--b)}.d15{background:var(--p);color:#fff}.d20{background:#777;color:#fff}
.day-line{flex:1;height:1px;background:var(--bd)}
.cols-row{display:flex;align-items:flex-start;padding:6px 0}
.col{display:flex;flex-direction:column;gap:4px;padding:0 5px;z-index:2;width:158px;flex-shrink:0}
.col-lbl{font-family:var(--fh);font-size:8px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--mu);margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid var(--bd)}
.col-empty{width:158px;flex-shrink:0}

/* NODE */
.node{display:flex;align-items:center;gap:5px;padding:4px 7px;border:1px solid var(--bd);background:var(--bg2);cursor:pointer;user-select:none;white-space:nowrap;min-height:26px;transition:border-color .1s,background .1s;position:relative}
.node:hover{border-color:var(--bd2);background:var(--bg3)}
.node.active{border-color:var(--g)!important;background:rgba(127,255,95,.07)!important}
.node.dimmed{opacity:.1}
.node .ic{font-size:13px;flex-shrink:0;line-height:1}
.node .nm{font-size:9px;color:var(--w);line-height:1.3}
.node .sub{font-size:8px;color:var(--mu);line-height:1.3}
.node.crop  {border-left:3px solid var(--g)}
.node.natural,.node.coop{border-left:3px solid var(--b)}
.node.inter  {border-left:3px solid var(--p)}
.node.food   {border-left:3px solid var(--r)}
.node.bottle {border-left:3px solid var(--b);border-right:3px solid var(--b)}
.node.special{border-left:3px solid var(--y);border-right:3px solid var(--y)}
.node.wip    {border-left:3px solid var(--mu);opacity:.5}

/* mechanic badge */
.mbadge{display:inline-block;font-size:7px;padding:1px 4px;margin-left:3px;vertical-align:middle;border-radius:1px}
.mb-stealth{background:rgba(191,127,255,.2);color:var(--p);border:1px solid var(--p)}
.mb-regen  {background:rgba(63,191,255,.2);color:var(--b);border:1px solid var(--b)}
.mb-bottle {background:rgba(63,191,255,.15);color:var(--b);border:1px solid rgba(63,191,255,.4)}
.mb-special{background:rgba(255,207,63,.15);color:var(--y);border:1px solid rgba(255,207,63,.4)}
.mb-craft  {background:rgba(127,255,95,.1);color:var(--g);border:1px solid rgba(127,255,95,.3)}
.trigger-badge{
  display:inline-block;font-size:7px;padding:1px 5px;margin-left:3px;
  background:rgba(255,207,63,.12);color:var(--y);
  border:1px solid rgba(255,207,63,.4);border-radius:1px;
  vertical-align:middle;white-space:nowrap;
}

/* PANEL */
.panel{position:fixed;right:0;top:0;bottom:0;width:270px;background:var(--bg2);border-left:1px solid var(--bd2);z-index:100;display:none;flex-direction:column;overflow-y:auto}
.panel-hd{padding:11px 14px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg2);z-index:2}
.ph{font-family:var(--fh);font-size:11px;font-weight:700;color:var(--g)}
.panel-hd button{background:none;border:none;color:var(--mu);cursor:pointer;font-size:11px;font-family:var(--fm)}
.panel-hd button:hover{color:var(--w)}
.panel-body{padding:14px;flex:1}
.pn{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--w);display:flex;align-items:center;gap:6px;margin-bottom:10px}
.pn .pic{font-size:18px}
.ptag{display:inline-block;font-size:8px;padding:1px 5px;margin-right:3px;margin-bottom:6px}
.pt-crop  {background:rgba(127,255,95,.1);color:var(--g);border:1px solid rgba(127,255,95,.3)}
.pt-natural,.pt-coop{background:rgba(63,191,255,.1);color:var(--b);border:1px solid rgba(63,191,255,.3)}
.pt-inter  {background:rgba(191,127,255,.1);color:var(--p);border:1px solid rgba(191,127,255,.3)}
.pt-food   {background:rgba(255,107,63,.1);color:var(--r);border:1px solid rgba(255,107,63,.3)}
.pt-bottle {background:rgba(63,191,255,.1);color:var(--b);border:1px solid rgba(63,191,255,.3)}
.pt-special{background:rgba(255,207,63,.1);color:var(--y);border:1px solid rgba(255,207,63,.3)}
.prow{margin-bottom:9px}
.pl{color:var(--mu);font-size:8px;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.pv{font-size:10px;color:var(--w);line-height:1.8}
.qty{color:var(--y);font-size:9px}
.pheal{font-size:16px;font-family:var(--fh);font-weight:700;color:var(--g)}
.pmech{font-size:11px;font-family:var(--fh);font-weight:700;padding:6px 10px;margin-top:4px;border:1px solid}

/* USAGE TABLE */
.usage-table{width:100%;border-collapse:collapse;font-size:11px}
.usage-table th{text-align:left;padding:7px 10px;background:var(--bg3);color:var(--g);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--bd);font-family:var(--fh)}
.usage-table td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.usage-table tr:hover td{background:rgba(127,255,95,.02)}
.bar-wrap{width:100px;height:5px;background:var(--bg3);border-radius:1px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px}
.bar{height:100%;border-radius:1px}
.usage-note{font-size:10px;color:var(--mu);margin-top:12px;line-height:1.9;padding:10px;border:1px solid var(--bd);background:var(--bg2)}
</style>
</head>
<body>
<div class="wrap">
<div class="hd">
  <h1>Recipe Diagram</h1>
  <p>Hover to highlight · Click for detail · Ghost label = off-screen linked item</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('diagram')">Recipe Diagram</div>
  <div class="tab" onclick="switchTab('bottles')">Bottles</div>
  <div class="tab" onclick="switchTab('specials')">Special Items</div>
  <div class="tab" onclick="switchTab('usecases')">Use Cases</div>
  <div class="tab" onclick="switchTab('usage')">Usage Balance</div>
</div>

<!-- TAB: DIAGRAM -->
<div class="view active" id="view-diagram">
<div class="leg">
  <div class="li"><div class="ld" style="background:#7fff5f"></div>Crop</div>
  <div class="li"><div class="ld" style="background:#3fbfff"></div>Natural / Coop</div>
  <div class="li"><div class="ld" style="background:#bf7fff"></div>Ingredient</div>
  <div class="li"><div class="ld" style="background:#ff6b3f"></div>Food</div>
  <div class="li"><div class="ld" style="background:#3fbfff;border:1px solid #3fbfff"></div>Bottle</div>
  <div class="li"><div class="ld" style="background:#ffcf3f"></div>Special Craft</div>
</div>
<div class="scroll-x">
<div class="diagram" id="diagram">
  <svg class="lines" id="svgLines"></svg>
  <div id="dayBlocks"></div>
</div>
</div>
</div>

<!-- TAB: BOTTLES -->
<div class="view" id="view-bottles">
<table class="usage-table">
  <thead><tr><th></th><th>Bottle</th><th>Tier</th><th>Recipe</th><th>Effect</th><th>Duration</th><th>Compatible</th></tr></thead>
  <tbody id="bottleRows"></tbody>
</table>
</div>

<!-- TAB: SPECIALS -->
<div class="view" id="view-specials">
<table class="usage-table">
  <thead><tr><th></th><th>Item</th><th>Recipe</th><th>Mechanic</th><th>Unlock</th></tr></thead>
  <tbody id="specialRows"></tbody>
</table>
</div>

<!-- TAB: USE CASES -->
<div class="view" id="view-usecases">
<div id="usecaseContent"></div>
</div>

<!-- TAB: USAGE -->
<div class="view" id="view-usage">
<table class="usage-table" id="usageTable"></table>
<div class="usage-note" id="usageNote"></div>
</div>

</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <div class="panel-hd"><span class="ph" id="p-title">Detail</span><button onclick="closePanel()">✕</button></div>
  <div class="panel-body" id="p-body"></div>
</div>

// SVG
const svg=document.getElementById('svgLines');
function dr(){return document.getElementById('diagram').getBoundingClientRect();}
function np(id){
  const el=document.getElementById('n-'+id);if(!el)return null;
  const er=el.getBoundingClientRect(),d=dr();
  return{r:er.right-d.left,l:er.left-d.left,my:er.top-d.top+er.height/2};
}
function bz(x1,y1,cx1,cy1,cx2,cy2,x2,y2,t){const u=1-t;return{x:u*u*u*x1+3*u*u*t*cx1+3*u*t*t*cx2+t*t*t*x2,y:u*u*u*y1+3*u*u*t*cy1+3*u*t*t*cy2+t*t*t*y2};}
function mkEl(tag,attrs){
  const e=document.createElementNS('http://www.w3.org/2000/svg',tag);
  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e;
}

function drawLines(hiId=null){
  svg.innerHTML='';
  const diag=document.getElementById('diagram');
  const W=diag.scrollWidth,H=diag.scrollHeight;
  svg.style.width=W+'px';svg.style.height=H+'px';
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);

  EDGES.forEach(({from,to})=>{
    const p1=np(from),p2=np(to);if(!p1||!p2)return;
    const isHi=hiId&&(from===hiId||to===hiId);
    const color=TC[ITEMS[from]?.type]||'#3fbfff';
    const x1=p1.r,y1=p1.my,x2=p2.l,y2=p2.my;
    const dx=(x2-x1)*0.4,cx1v=x1+dx,cx2v=x2-dx;

    svg.appendChild(mkEl('path',{
      d:`M${x1},${y1} C${cx1v},${y1} ${cx2v},${y2} ${x2},${y2}`,
      fill:'none',stroke:isHi?color:'#1e301e',
      'stroke-width':isHi?'2':'1',
      'stroke-dasharray':isHi?'none':'3,3',
      opacity:!hiId?'0.45':(isHi?'1':'0.04'),
    }));

    if(!isHi)return;

    // qty badge
    const toSlots=slots(ITEMS[to]);
    const totalQty=toSlots.filter(s=>s.id===from).reduce((a,s)=>a+s.qty,0)||(from==='coconut'&&to==='coconut_milk'?3:0);
    if(totalQty>1){
      const mp=bz(x1,y1,cx1v,y1,cx2v,y2,x2,y2,0.5);
      svg.appendChild(mkEl('rect',{x:mp.x-12,y:mp.y-7,width:24,height:14,fill:'#080c08',rx:2}));
      const t=mkEl('text',{x:mp.x,y:mp.y+1,'text-anchor':'middle','dominant-baseline':'middle','font-size':'8.5','font-family':'Space Mono,monospace',fill:color});
      t.textContent='×'+totalQty;svg.appendChild(t);
    }
  });
}

let activeId=null;
function conn(id){const s=new Set();EDGES.forEach(({from,to})=>{if(from===id)s.add(to);if(to===id)s.add(from);});return s;}
function hl(id){const c=conn(id);document.querySelectorAll('.node').forEach(n=>{if(n.dataset.id===id||c.has(n.dataset.id))n.classList.remove('dimmed');else n.classList.add('dimmed');});drawLines(id);}

  }
  if(item.effect&&item.type==='bottle'){
    html+=`<div class="prow"><div class="pl">Effect</div><div class="pv" style="color:var(--b)">${item.effect}</div></div>`;
    if(item.dur) html+=`<div class="prow"><div class="pl">Duration</div><div class="pv">${item.dur}</div></div>`;
    if(item.guns) html+=`<div class="prow"><div class="pl">Compatible</div><div class="pv" style="color:var(--mu)">${item.guns}</div></div>`;
  }
  if(item.effect&&item.type==='special'){
    html+=`<div class="prow"><div class="pl">Effect</div><div class="pv" style="color:var(--y)">${item.effect}</div></div>`;
  }
  if(item.recipe){
    html+=`<div class="prow"><div class="pl">Recipe</div><div class="pv">`;
    slots(item).forEach((s,i)=>{
      const ing=ITEMS[s.id];
      if(i>0) html+=` <span style="color:var(--mu)">+</span> `;
      html+=`<span class="qty">×${s.qty}</span> ${ing?.ic||'?'} ${ing?.nm||s.id}`;
    });
    html+='</div></div>';
  }
  if(usedIn.length) html+=`<div class="prow"><div class="pl">Used in (${usedIn.length})</div><div class="pv">${usedIn.join('<br>')}</div></div>`;
  document.getElementById('p-body').innerHTML=html;
}
function closePanel(){
  document.getElementById('panel').style.display='none';
  activeId=null;
  document.querySelectorAll('.node').forEach(n=>n.classList.remove('active','dimmed'));
  rst();
}
window.addEventListener('load',()=>setTimeout(drawLines,120));
window.addEventListener('resize',()=>drawLines(activeId||null));
</script>
</body>
</html>
